#
# ## Where the samples will be written
save_data: /data/stu1/ml_project/bioec_retro1/single_retro/data/save
# ## Where the vocab(s) will be written
src_vocab: /data/stu1/ml_project/bioec_retro1/single_retro/data/vocab.src
tgt_vocab: /data/stu1/ml_project/bioec_retro1/single_retro/data/vocab.tgt
# # Prevent overwriting existing files in the folder
overwrite: False

share_vocab: False
# # Corpus opts:
data:
    #train:
    corpus_1:
        path_src: /data/stu1/ml_project/bioec_retro1/dataset/USPTO/train_src.txt
        path_tgt: /data/stu1/ml_project/bioec_retro1/dataset/USPTO/train_tgt.txt
        weight: 1
    corpus_2:
        path_src: /data/stu1/ml_project/bioec_retro1/dataset/data_processed/tokenized/tokenized_src_train.txt
        path_tgt: /data/stu1/ml_project/bioec_retro1/dataset/data_processed/tokenized/tokenized_tgt_train.txt
        weight: 4
        dynamic_weight: false
    valid:
        path_src: /data/stu1/ml_project/bioec_retro1/dataset/data_processed/tokenized/tokenized_src_valid.txt
        path_tgt: /data/stu1/ml_project/bioec_retro1/dataset/data_processed/tokenized/tokenized_tgt_valid.txt
#src_seq_length: 300
#tgt_seq_length: 300

# General opts
#save_model: /data/stu1/hjq3/A44/opennmt/SAVE_300000/20250407
save_model: /data/stu1/ml_project/bioec_retro1/single_retro/save112/20260122
save_checkpoint_steps: 2000
keep_checkpoint: 10
train_steps: 200000
seed: 20260118

# Batching
#gpu_ranks: [1]
#world_size: 2
gpu_ranks: [0]
max_generator_batches: 32
batch_type: "tokens"
batch_size: 4096
accum_count: [4]
report_every: 2000
#world_size: 2

# # Optimization
optim: "adam"
learning_rate: 2
warmup_steps: 8000
decay_method: "noam"
adam_beta2: 0.998
max_grad_norm: 0
param_init: 0
param_init_glorot: true
normalization: "tokens"
label_smoothing: 0.0

# # Model
encoder_type: transformer
decoder_type: transformer
position_encoding: true
enc_layers: 4
dec_layers: 4
heads: 8
rnn_size: 512
word_vec_size: 512
transformer_ff: 2048
dropout: [0.1]
share_embeddings: False
global_attention: general
global_attention_function: softmax
self_attn_type: scaled-dot

#onmt_train -config /data/stu1/hjq_pycharm_project/A55/OPENNMT/train.yaml

